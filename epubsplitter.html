    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "jszip": "https://esm.sh/jszip@3.10.1",
    "lucide-react": "https://esm.sh/lucide-react@0.344.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

    "vite": "https://esm.sh/vite@^7.3.1",

<body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>

    <script type="module">
        import React, { useState, useCallback, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import JSZip from 'jszip';
        import { Book, Download, RefreshCcw, Scissors, UploadCloud, ChevronRight, ChevronDown, FileText, Folder, CheckCircle2 } from 'lucide-react';

        // --- SERVICES (epubService.ts logic) ---

        const resolvePath = (base, relative) => {
            if (relative.startsWith('/')) return relative.substring(1);

            const stack = base.split('/');
            stack.pop(); // Remove current file name
            
            const parts = relative.split('/');
            for (const part of parts) {
                if (part === '' || part === '.') continue;
                if (part === '..') {
                    stack.pop();
                } else {
                    stack.push(part);
                }
            }
            return stack.join('/');
        };

        class EpubService {
            constructor() {
                this.zip = new JSZip();
                this.epubData = null;
            }

            async load(file) {
                this.zip = await JSZip.loadAsync(file);
                
                // 1. Find META-INF/container.xml
                const containerXml = await this.zip.file('META-INF/container.xml')?.async('text');
                if (!containerXml) throw new Error('Invalid EPUB: META-INF/container.xml not found');
                
                const parser = new DOMParser();
                const containerDoc = parser.parseFromString(containerXml, 'application/xml');
                const opfPath = containerDoc.querySelector('rootfile')?.getAttribute('full-path');
                if (!opfPath) throw new Error('Invalid EPUB: OPF path not found');

                // 2. Parse OPF
                const opfContent = await this.zip.file(opfPath)?.async('text');
                if (!opfContent) throw new Error('OPF file missing');
                const opfDoc = parser.parseFromString(opfContent, 'application/xml');

                // Metadata
                const metadata = {
                    title: opfDoc.querySelector('metadata > title')?.textContent || 'Untitled',
                    creator: opfDoc.querySelector('metadata > creator')?.textContent || 'Unknown',
                    language: opfDoc.querySelector('metadata > language')?.textContent || 'en',
                };

                // Manifest
                const manifest = {};
                const manifestItems = Array.from(opfDoc.querySelectorAll('manifest > item'));
                manifestItems.forEach(item => {
                    const id = item.getAttribute('id');
                    const href = item.getAttribute('href');
                    const mediaType = item.getAttribute('media-type');
                    if (id && href && mediaType) {
                        manifest[id] = { href: resolvePath(opfPath, href), mediaType };
                    }
                });

                // Spine
                const spine = Array.from(opfDoc.querySelectorAll('spine > itemref'))
                    .map(item => item.getAttribute('idref'))
                    .filter(id => !!id);

                // Locate TOC
                let ncxPath;
                let navPath;
                let toc = [];

                // EPUB 3 Nav
                const navItem = manifestItems.find(item => item.getAttribute('properties')?.includes('nav'));
                if (navItem) {
                    const href = navItem.getAttribute('href');
                    if(href) {
                        navPath = resolvePath(opfPath, href);
                        const navContent = await this.zip.file(navPath)?.async('text');
                        if (navContent) {
                            const navDoc = parser.parseFromString(navContent, 'application/xml');
                            toc = this.parseNav(navDoc, navPath);
                        }
                    }
                }

                // EPUB 2 NCX Fallback
                if (toc.length === 0) {
                    const spineEl = opfDoc.querySelector('spine');
                    const tocId = spineEl?.getAttribute('toc');
                    if (tocId && manifest[tocId]) {
                        ncxPath = manifest[tocId].href;
                        const ncxContent = await this.zip.file(ncxPath)?.async('text');
                        if (ncxContent) {
                            const ncxDoc = parser.parseFromString(ncxContent, 'application/xml');
                            toc = this.parseNcx(ncxDoc, ncxPath);
                        }
                    }
                }

                this.epubData = { metadata, toc, opfPath, ncxPath, navPath, manifest, spine };
                return this.epubData;
            }

            parseNcx(doc, basePath) {
                const parsePoints = (elements) => {
                    return elements.map((el, index) => {
                        const label = el.querySelector('navLabel > text')?.textContent || `Chapter ${index + 1}`;
                        const content = el.querySelector('content');
                        const src = content?.getAttribute('src');
                        const fullHref = src ? resolvePath(basePath, src) : '';
                        
                        const children = Array.from(el.children).filter(child => child.tagName.toLowerCase() === 'navpoint');
                        
                        return {
                            id: el.getAttribute('id') || `navPoint-${Math.random()}`,
                            label,
                            href: fullHref,
                            src: fullHref,
                            subItems: parsePoints(children)
                        };
                    });
                };
                
                const navMap = doc.querySelector('navMap');
                if (!navMap) return [];
                const topLevelPoints = Array.from(navMap.children).filter(child => child.tagName.toLowerCase() === 'navpoint');
                return parsePoints(topLevelPoints);
            }

            parseNav(doc, basePath) {
                const navNode = doc.querySelector('nav[epub\\:type="toc"]') || doc.querySelector('nav');
                if (!navNode) return [];

                const parseOl = (ol) => {
                    const lis = Array.from(ol.children).filter(c => c.tagName.toLowerCase() === 'li');
                    return lis.map((li, idx) => {
                        const anchor = li.querySelector(':scope > a') || li.querySelector(':scope > span');
                        const label = anchor?.textContent || `Section ${idx}`;
                        const hrefRaw = anchor?.getAttribute('href');
                        const href = hrefRaw ? resolvePath(basePath, hrefRaw) : '';
                        
                        const childOl = li.querySelector(':scope > ol');
                        
                        return {
                            id: `nav-${Math.random()}`,
                            label,
                            href,
                            subItems: childOl ? parseOl(childOl) : []
                        };
                    });
                };

                const ol = navNode.querySelector('ol');
                return ol ? parseOl(ol) : [];
            }

            async extractChapter(selectedNodeId, onProgress) {
                if (!this.epubData) throw new Error('No EPUB loaded');
                const { opfPath, toc, manifest } = this.epubData;

                onProgress?.(5);

                // 1. Find node
                const findNode = (items) => {
                    for (const item of items) {
                        if (item.id === selectedNodeId) return item;
                        const found = findNode(item.subItems);
                        if (found) return found;
                    }
                    return null;
                };
                const targetNode = findNode(toc);
                if (!targetNode) throw new Error('Selected chapter not found in TOC');

                onProgress?.(10);

                // 2. Collect HTML files
                const requiredHtmlFiles = new Set();
                const collectHrefs = (node) => {
                    const filePath = node.href.split('#')[0];
                    if (filePath) requiredHtmlFiles.add(filePath);
                    node.subItems.forEach(collectHrefs);
                };
                collectHrefs(targetNode);

                onProgress?.(15);

                // 3. Analyze content for assets
                const usedAssets = new Set();
                const parser = new DOMParser();
                const safeDecode = (str) => {
                    if (!str) return null;
                    try { return decodeURIComponent(str); } catch (e) { return str; }
                };

                for (const htmlPath of requiredHtmlFiles) {
                    const fileInZip = this.zip.file(htmlPath);
                    if (!fileInZip) continue;

                    let content;
                    try { content = await fileInZip.async('text'); } catch (e) { continue; }

                    const doc = parser.parseFromString(content, 'text/html');
                    
                    // Images/Media
                    const mediaElements = Array.from(doc.querySelectorAll('img, video, audio, source, input[type="image"]'));
                    mediaElements.forEach(el => {
                        const src = safeDecode(el.getAttribute('src') || el.getAttribute('poster'));
                        if (src) usedAssets.add(resolvePath(htmlPath, src));
                    });

                    // SVG
                    const svgImages = Array.from(doc.querySelectorAll('image'));
                    svgImages.forEach(el => {
                        const href = safeDecode(el.getAttribute('href') || el.getAttribute('xlink:href'));
                        if (href) usedAssets.add(resolvePath(htmlPath, href));
                    });

                    // CSS
                    const links = Array.from(doc.querySelectorAll('link[rel="stylesheet"]'));
                    links.forEach(el => {
                        const href = safeDecode(el.getAttribute('href'));
                        if (href) usedAssets.add(resolvePath(htmlPath, href));
                    });
                }

                onProgress?.(25);

                // 4. Identify Spine Items
                const hrefToId = {};
                Object.entries(manifest).forEach(([id, data]) => {
                    hrefToId[data.href] = id;
                });

                const idsToKeepInSpine = new Set();
                requiredHtmlFiles.forEach(href => {
                    if (hrefToId[href]) idsToKeepInSpine.add(hrefToId[href]);
                });

                // 5. Create New Zip
                const newZip = new JSZip();

                // Mimetype
                try {
                    const mimetype = await this.zip.file('mimetype')?.async('text');
                    if (mimetype) newZip.file('mimetype', mimetype, { compression: 'STORE' });
                } catch (e) {
                    newZip.file('mimetype', 'application/epub+zip', { compression: 'STORE' });
                }

                // META-INF
                try {
                    const container = await this.zip.file('META-INF/container.xml')?.async('text');
                    if (container) newZip.folder('META-INF')?.file('container.xml', container);
                } catch (e) {}

                onProgress?.(30);

                // Copy Assets
                const files = this.zip.files;
                const fileKeys = Object.keys(files);
                let processedCount = 0;
                const totalFiles = fileKeys.length;

                for (const [path, fileObj] of Object.entries(files)) {
                    if (path === 'mimetype' || path.startsWith('META-INF/')) continue;
                    
                    const isContentDoc = requiredHtmlFiles.has(path);
                    const manifestEntry = Object.values(manifest).find(m => m.href === path);
                    const mediaType = manifestEntry?.mediaType || '';
                    
                    let shouldKeep = false;

                    if (isContentDoc) {
                        shouldKeep = true;
                    } else if (path === opfPath || path === this.epubData.ncxPath || path === this.epubData.navPath) {
                        shouldKeep = false; // We rewrite these
                    } else {
                        const isImage = mediaType.startsWith('image/') || /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(path);
                        const isFont = mediaType.startsWith('font/') || /\.(ttf|otf|woff|woff2)$/i.test(path);
                        const isCSS = mediaType === 'text/css' || /\.css$/i.test(path);
                        
                        if (isFont || isCSS) {
                            shouldKeep = true;
                        } else if (isImage) {
                            if (usedAssets.has(path)) shouldKeep = true;
                        } else {
                            if (usedAssets.has(path) || mediaType === 'application/javascript') shouldKeep = true;
                        }
                    }

                    if (shouldKeep) {
                        try {
                            newZip.file(path, await fileObj.async('blob'));
                        } catch (e) {}
                    }
                    
                    processedCount++;
                    if (processedCount % 20 === 0) {
                        onProgress?.(30 + Math.floor((processedCount / totalFiles) * 30));
                    }
                }

                onProgress?.(60);

                // 6. Rewrite OPF
                const serializer = new XMLSerializer();
                const originalOpfContent = await this.zip.file(opfPath)?.async('text');
                const newOpfDoc = parser.parseFromString(originalOpfContent, 'application/xml');
                
                const titleNode = newOpfDoc.querySelector('metadata > title');
                if (titleNode) titleNode.textContent = `${titleNode.textContent} - ${targetNode.label}`;

                const manifestNode = newOpfDoc.querySelector('manifest');
                if (manifestNode) {
                    const items = Array.from(manifestNode.querySelectorAll('item'));
                    items.forEach(item => {
                        const href = item.getAttribute('href');
                        if (href) {
                            const fullPath = resolvePath(opfPath, href);
                            if (!newZip.file(fullPath)) {
                                if (fullPath !== this.epubData?.ncxPath && fullPath !== this.epubData?.navPath) {
                                    manifestNode.removeChild(item);
                                }
                            }
                        }
                    });
                }

                const spineNode = newOpfDoc.querySelector('spine');
                if (spineNode) {
                    const itemrefs = Array.from(spineNode.querySelectorAll('itemref'));
                    itemrefs.forEach(ref => {
                        const idref = ref.getAttribute('idref');
                        if (idref && !idsToKeepInSpine.has(idref)) {
                            spineNode.removeChild(ref);
                        }
                    });
                }

                newZip.file(opfPath, serializer.serializeToString(newOpfDoc));

                // 7. Rewrite TOC
                if (this.epubData.ncxPath) {
                    const ncxContent = await this.zip.file(this.epubData.ncxPath)?.async('text');
                    if (ncxContent) {
                        const ncxDoc = parser.parseFromString(ncxContent, 'application/xml');
                        const navMap = ncxDoc.querySelector('navMap');
                        if (navMap) {
                            while (navMap.firstChild) navMap.removeChild(navMap.firstChild);
                            const originalNcxDoc = parser.parseFromString(ncxContent, 'application/xml');
                            
                            const findXmlNode = (parent, id) => {
                                const children = Array.from(parent.children);
                                for (const child of children) {
                                    if (child.getAttribute('id') === id) return child;
                                    const found = findXmlNode(child, id);
                                    if (found) return found;
                                }
                                return null;
                            };

                            const originalNavMap = originalNcxDoc.querySelector('navMap');
                            if (originalNavMap) {
                                const selectedXmlNode = findXmlNode(originalNavMap, selectedNodeId);
                                if (selectedXmlNode) {
                                    navMap.appendChild(ncxDoc.importNode(selectedXmlNode, true));
                                }
                            }
                        }
                        newZip.file(this.epubData.ncxPath, serializer.serializeToString(ncxDoc));
                    }
                }

                if (this.epubData.navPath) {
                    const navContent = await this.zip.file(this.epubData.navPath)?.async('text');
                    if (navContent) newZip.file(this.epubData.navPath, navContent);
                }

                onProgress?.(70);

                return await newZip.generateAsync({ 
                    type: 'blob', 
                    mimeType: 'application/epub+zip',
                    compression: 'DEFLATE',
                    compressionOptions: { level: 6 }
                }, (metadata) => {
                    onProgress?.(70 + Math.floor(metadata.percent * 0.3));
                });
            }
        }

        // --- COMPONENTS ---

        const FileUpload = ({ onFileSelect, isProcessing }) => {
            const handleDrop = useCallback((e) => {
                e.preventDefault();
                if (isProcessing) return;
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    const file = e.dataTransfer.files[0];
                    if (file.name.endsWith('.epub')) {
                        onFileSelect(file);
                    } else {
                        alert('Please upload a valid .epub file');
                    }
                }
            }, [onFileSelect, isProcessing]);

            const handleChange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    onFileSelect(e.target.files[0]);
                }
            };

            return React.createElement('div', {
                onDrop: handleDrop,
                onDragOver: (e) => e.preventDefault(),
                className: `
                    w-full max-w-xl mx-auto border-2 border-dashed rounded-xl p-12 text-center transition-all duration-300
                    ${isProcessing ? 'bg-slate-50 border-slate-200 opacity-50 cursor-not-allowed' : 'bg-white border-brand-200 hover:border-brand-500 hover:shadow-lg hover:shadow-brand-100 cursor-pointer'}
                `
            }, 
                React.createElement('input', {
                    type: 'file',
                    accept: '.epub',
                    onChange: handleChange,
                    disabled: isProcessing,
                    className: 'hidden',
                    id: 'file-upload'
                }),
                React.createElement('label', { htmlFor: 'file-upload', className: 'cursor-pointer block' },
                    React.createElement('div', { className: 'flex justify-center mb-6' },
                        React.createElement('div', { className: 'p-4 bg-brand-50 rounded-full text-brand-600' },
                            isProcessing 
                            ? React.createElement('div', { className: 'animate-spin rounded-full h-8 w-8 border-b-2 border-brand-600' })
                            : React.createElement(UploadCloud, { size: 48 })
                        )
                    ),
                    React.createElement('h3', { className: 'text-xl font-serif font-medium text-slate-800 mb-2' },
                        isProcessing ? 'Processing EPUB...' : 'Upload your EPUB'
                    ),
                    React.createElement('p', { className: 'text-slate-500 mb-6' },
                        'Drag and drop your ebook here, or click to browse.'
                    ),
                    !isProcessing && React.createElement('span', {
                        className: 'inline-block px-6 py-2 bg-brand-600 text-white font-medium rounded-lg shadow-sm hover:bg-brand-700 transition-colors'
                    }, 'Select File')
                )
            );
        };

        const TocNode = ({ item, selectedId, onSelect, depth = 0 }) => {
            const [isOpen, setIsOpen] = useState(false);
            const hasChildren = item.subItems && item.subItems.length > 0;
            const isSelected = selectedId === item.id;

            const handleExpand = (e) => {
                e.stopPropagation();
                setIsOpen(!isOpen);
            };

            return React.createElement('div', { className: 'select-none' },
                React.createElement('div', {
                    onClick: () => onSelect(item.id, item.label),
                    className: `
                        group flex items-center py-2.5 px-3 rounded-md cursor-pointer transition-all duration-200 border-l-4
                        ${isSelected 
                            ? 'bg-brand-100 border-brand-600 text-brand-900 shadow-sm' 
                            : 'border-transparent hover:bg-slate-100 text-slate-700'}
                    `,
                    style: { marginLeft: `${depth * 1.5}rem` }
                },
                    React.createElement('button', {
                        onClick: handleExpand,
                        className: `mr-2 p-0.5 rounded hover:bg-black/10 text-slate-400 ${hasChildren ? 'visible' : 'invisible'}`
                    },
                        isOpen ? React.createElement(ChevronDown, { size: 14 }) : React.createElement(ChevronRight, { size: 14 })
                    ),
                    React.createElement('span', { className: `mr-2 ${isSelected ? 'text-brand-600' : 'text-slate-400'}` },
                        hasChildren ? React.createElement(Folder, { size: 16 }) : React.createElement(FileText, { size: 16 })
                    ),
                    React.createElement('span', { className: `text-sm truncate font-medium flex-1 ${isSelected ? 'font-bold' : ''}` },
                        item.label
                    ),
                    isSelected && React.createElement(CheckCircle2, { size: 16, className: 'text-brand-600 ml-2' })
                ),
                hasChildren && isOpen && React.createElement('div', { className: 'ml-1' },
                    item.subItems.map(subItem => 
                        React.createElement(TocNode, {
                            key: subItem.id,
                            item: subItem,
                            selectedId: selectedId,
                            onSelect: onSelect,
                            depth: depth + 1
                        })
                    )
                )
            );
        };

        const TocViewer = ({ items, selectedId, onSelect }) => {
            return React.createElement('div', {
                className: 'bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[600px]'
            },
                React.createElement('div', { className: 'p-4 bg-slate-50 border-b border-slate-200' },
                    React.createElement('h2', { className: 'font-serif text-lg font-bold text-slate-800' }, 'Table of Contents'),
                    React.createElement('p', { className: 'text-xs text-slate-500 mt-1' }, 'Select a chapter to extract. Sub-chapters will be included automatically.')
                ),
                React.createElement('div', { className: 'overflow-y-auto flex-1 p-2' },
                    items.length === 0 
                    ? React.createElement('div', { className: 'text-center p-8 text-slate-400' }, 'No Table of Contents found.')
                    : items.map(item => 
                        React.createElement(TocNode, {
                            key: item.id,
                            item: item,
                            selectedId: selectedId,
                            onSelect: onSelect
                        })
                    )
                )
            );
        };

        const App = () => {
            const [epubService] = useState(() => new EpubService());
            const [epubStructure, setEpubStructure] = useState(null);
            const [selectedNodeId, setSelectedNodeId] = useState(null);
            const [selectedLabel, setSelectedLabel] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [downloading, setDownloading] = useState(false);
            const [progress, setProgress] = useState(0);

            const handleFileSelect = async (file) => {
                setLoading(true);
                setError(null);
                setEpubStructure(null);
                setSelectedNodeId(null);
                setProgress(0);
                
                try {
                    const structure = await epubService.load(file);
                    setEpubStructure(structure);
                } catch (err) {
                    console.error(err);
                    setError("Failed to parse EPUB. Ensure it is a valid, non-DRM EPUB file.");
                } finally {
                    setLoading(false);
                }
            };

            const handleExtract = async () => {
                if (!selectedNodeId || !selectedLabel) return;
                setDownloading(true);
                setProgress(0);
                try {
                    const blob = await epubService.extractChapter(selectedNodeId, (percent) => setProgress(percent));
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const safeLabel = selectedLabel.replace(/[^a-z0-9]/gi, '_').substring(0, 50);
                    a.download = `${safeLabel}.epub`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (err) {
                    console.error(err);
                    setError("Failed to generate new EPUB.");
                } finally {
                    setTimeout(() => { setDownloading(false); setProgress(0); }, 1000);
                }
            };

            const reset = () => {
                setEpubStructure(null);
                setSelectedNodeId(null);
                setError(null);
                setProgress(0);
            };

            return React.createElement('div', { className: 'min-h-screen bg-slate-50 flex flex-col' },
                // Header
                React.createElement('header', { className: 'bg-white border-b border-slate-200 sticky top-0 z-10' },
                    React.createElement('div', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between' },
                        React.createElement('div', { className: 'flex items-center space-x-3' },
                            React.createElement('div', { className: 'bg-brand-600 p-2 rounded-lg text-white' },
                                React.createElement(Book, { size: 20 })
                            ),
                            React.createElement('h1', { className: 'text-xl font-serif font-bold text-slate-900' }, 'EpubSplitter Pro')
                        ),
                        epubStructure && React.createElement('button', {
                            onClick: reset,
                            className: 'text-sm font-medium text-slate-500 hover:text-brand-600 flex items-center'
                        }, React.createElement(RefreshCcw, { size: 16, className: 'mr-1' }), 'Start Over')
                    )
                ),

                // Main
                React.createElement('main', { className: 'flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full' },
                    error && React.createElement('div', { className: 'mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-center' },
                        React.createElement('span', { className: 'mr-2' }, '⚠️'), error
                    ),

                    !epubStructure 
                    ? React.createElement('div', { className: 'flex flex-col items-center justify-center min-h-[60vh]' },
                        React.createElement('div', { className: 'text-center mb-10 max-w-2xl' },
                            React.createElement('h2', { className: 'text-3xl font-serif font-bold text-slate-900 mb-4' }, 'Split your Ebooks with Precision'),
                            React.createElement('p', { className: 'text-lg text-slate-600' }, 'Upload your EPUB, explore the table of contents, and extract exactly the chapters you need into a fresh, perfectly formatted file.')
                        ),
                        React.createElement(FileUpload, { onFileSelect: handleFileSelect, isProcessing: loading })
                      )
                    : React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-3 gap-8 h-full' },
                        // Sidebar
                        React.createElement('div', { className: 'lg:col-span-1 space-y-6' },
                            React.createElement('div', { className: 'bg-white p-6 rounded-xl shadow-sm border border-slate-200' },
                                React.createElement('h3', { className: 'text-xs font-bold text-slate-400 uppercase tracking-wider mb-4' }, 'Book Metadata'),
                                React.createElement('div', { className: 'space-y-3' },
                                    React.createElement('div', null,
                                        React.createElement('span', { className: 'block text-xs text-slate-500' }, 'Title'),
                                        React.createElement('span', { className: 'font-serif font-medium text-slate-900' }, epubStructure.metadata.title)
                                    ),
                                    React.createElement('div', null,
                                        React.createElement('span', { className: 'block text-xs text-slate-500' }, 'Author'),
                                        React.createElement('span', { className: 'text-sm text-slate-700' }, epubStructure.metadata.creator)
                                    ),
                                    React.createElement('div', null,
                                        React.createElement('span', { className: 'block text-xs text-slate-500' }, 'Language'),
                                        React.createElement('span', { className: 'text-sm text-slate-700 uppercase' }, epubStructure.metadata.language)
                                    )
                                )
                            )
                        ),
                        // TOC Area
                        React.createElement('div', { className: 'lg:col-span-2 flex flex-col gap-6' },
                            React.createElement(TocViewer, {
                                items: epubStructure.toc,
                                selectedId: selectedNodeId,
                                onSelect: (id, label) => {
                                    setSelectedNodeId(id);
                                    setSelectedLabel(label);
                                }
                            }),
                            React.createElement('div', { className: 'bg-white p-6 rounded-xl shadow-sm border border-slate-200 transition-all duration-300' },
                                React.createElement('div', { className: 'flex items-center justify-between mb-4' },
                                    React.createElement('h3', { className: 'flex items-center text-slate-800 font-bold' },
                                        React.createElement(Scissors, { size: 20, className: 'mr-2 text-brand-600' }),
                                        'Extraction Control'
                                    ),
                                    selectedNodeId && !downloading && React.createElement('span', { className: 'text-sm text-brand-600 bg-brand-50 px-3 py-1 rounded-full font-medium' },
                                        `Selected: ${selectedLabel}`
                                    )
                                ),
                                downloading 
                                ? React.createElement('div', { className: 'space-y-2' },
                                    React.createElement('div', { className: 'flex justify-between text-sm text-slate-600 mb-1' },
                                        React.createElement('span', null, 'Building EPUB...'),
                                        React.createElement('span', { className: 'font-medium' }, `${progress}%`)
                                    ),
                                    React.createElement('div', { className: 'w-full bg-slate-100 rounded-full h-3 overflow-hidden' },
                                        React.createElement('div', {
                                            className: 'bg-brand-500 h-3 rounded-full transition-all duration-300 ease-out',
                                            style: { width: `${progress}%` }
                                        })
                                    ),
                                    React.createElement('p', { className: 'text-xs text-slate-400 mt-2 text-center' }, 'Copying assets and rewriting structure...')
                                  )
                                : React.createElement('div', { className: 'space-y-4' },
                                    React.createElement('p', { className: 'text-sm text-slate-500' },
                                        selectedNodeId 
                                        ? "Click the button below to generate a new EPUB containing only the selected chapter and its contents." 
                                        : "Please select a chapter from the Table of Contents above to unlock extraction."
                                    ),
                                    React.createElement('button', {
                                        onClick: handleExtract,
                                        disabled: !selectedNodeId,
                                        className: `
                                            w-full flex items-center justify-center py-4 px-6 rounded-lg font-bold text-lg shadow-sm transition-all
                                            ${!selectedNodeId 
                                            ? 'bg-slate-100 text-slate-400 cursor-not-allowed border border-slate-200'
                                            : 'bg-brand-600 text-white hover:bg-brand-700 hover:shadow-lg transform active:scale-[0.99]'}
                                        `
                                    },
                                        React.createElement(Download, { size: 20, className: 'mr-2' }),
                                        'Extract Chapter'
                                    )
                                )
                            )
                        )
                    )
                )
            );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(React.createElement(App));
    </script>
</body>
</html>
